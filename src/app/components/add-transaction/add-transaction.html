<div class="form-container">
  <header class="form-header">
    <h2 class="page-title">Record New Transaction</h2>
    <p class="page-subtitle">Log an expenditure or asset injection to maintain ledger synchronization.</p>
  </header>

  <form class="transaction-form" (ngSubmit)="onSubmitTransaction()">
    <div *ngIf="errorMessage" class="status-alert alert-danger">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="status-alert alert-success">
      {{ successMessage }}
    </div>

    <div class="form-grid">
      <div class="form-group full-width">
        <label>Merchant / Description</label>
        <input
          type="text"
          name="description"
          [(ngModel)]="transaction.description"
          placeholder="e.g., Apple Store Online, Corporate Salary"
          class="form-input"
          required />
      </div>

      <div class="form-group">
        <label>Amount</label>
        <input
          type="number"
          name="amount"
          [(ngModel)]="transaction.amount"
          min="1"
          step="1"
          placeholder="0"
          class="form-input"
          required />
      </div>

      <div class="form-group">
        <label>Transaction Type</label>
        <select class="form-input" name="type" [(ngModel)]="transaction.type" (ngModelChange)="onTransactionTypeChange()" required>
          <option value="" disabled>Select execution type</option>
          <option value="expense">Expense (Debit)</option>
          <option value="income">Income (Credit)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Category Allocation</label>
        <select class="form-input" name="category" [(ngModel)]="transaction.category" required>
          <option value="" disabled>Select target allocation</option>
          <option *ngFor="let budget of budgetOptions" [value]="budget">{{ budget }}</option>
          <option *ngIf="transaction.type === 'income'" value="Income">Core Income</option>
        </select>
      </div>

      <div class="form-group">
        <label>Execution Date</label>
        <input
          type="date"
          name="date"
          [(ngModel)]="transaction.date"
          class="form-input"
          required />
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Commit Transaction' }}
      </button>
    </div>
  </form>
</div>
